name: Deploy to cPanel

# Triggered on every push to main. Builds the React app, packages the PHP
# backend alongside it, and uploads everything to your cPanel hosting via FTP.
#
# Configure these secrets in your GitHub repo
# (Settings > Secrets and variables > Actions):
#
#   FTP_HOST       — your cPanel host (e.g. ftp.crystaltechnologys.com)
#   FTP_USERNAME   — the FTP/cPanel username
#   FTP_PASSWORD   — the FTP/cPanel password
#   FTP_SERVER_DIR — remote target directory (usually `/public_html/`)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci || npm install

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      # Stage the final cPanel layout into ./deploy/:
      #   deploy/index.html, deploy/assets/  (from frontend/dist)
      #   deploy/api/                        (PHP backend)
      #   deploy/.htaccess                   (SPA fallback)
      - name: Assemble deploy bundle
        run: |
          mkdir -p deploy/api
          cp -R frontend/dist/. deploy/
          cp -R backend/public/. deploy/api/
          cp -R backend/src deploy/api/src
          mkdir -p deploy/api/config
          cp backend/config/config.example.php deploy/api/config/config.example.php
          cp deploy-htaccess.txt deploy/.htaccess

      - name: Deploy to cPanel via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
          local-dir: ./deploy/
          # Never overwrite the live production config on the server.
          exclude: |
            **/config/config.php
            **/storage/**
